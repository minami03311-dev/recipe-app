<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>レシピ帖</title>
  <meta name="theme-color" content="#f5f2ed" />

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="レシピ帖" />

  <!-- フォント（上品な明朝＋読みやすいゴシック） -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;600&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <!-- ===== ログイン画面 ===== -->
  <section id="view-login" class="view view-login">
    <div class="login-card">
      <div class="login-mark">
        <img src="icons/icon-192.png" alt="" />
      </div>
      <h1 class="login-title">レシピ帖</h1>
      <p class="login-sub">あなただけの、お気に入りレシピを<br />そっと集めておく場所。</p>
      <!-- Googleの「アカウントをタップ」ボタン（ここに表示される） -->
      <div id="g-signin" class="g-signin"></div>
      <!-- 予備：従来のリダイレクト方式（うまくいかない時用） -->
      <button id="btn-login" class="link-btn login-fallback">うまくいかない時は別の方法でログイン</button>
      <p class="login-note">※ あなたのレシピは本人だけが見られます</p>
    </div>
  </section>

  <!-- ===== アプリ本体 ===== -->
  <div id="app" class="app hidden">

    <!-- 上部バー -->
    <header class="appbar">
      <button id="btn-back" class="appbar-back hidden" aria-label="戻る">‹</button>
      <h1 id="appbar-title" class="appbar-title">レシピ帖</h1>
      <button id="btn-logout" class="appbar-logout" aria-label="ログアウト">⏻</button>
    </header>

    <main class="content">

      <!-- 一覧（ホーム） -->
      <section id="view-home" class="view">
        <div id="home-list" class="card-grid"></div>
        <div id="home-empty" class="empty hidden">
          <p class="empty-emoji">🍳</p>
          <p>まだレシピがありません。<br />右下の「＋」から登録してみましょう。</p>
        </div>
      </section>

      <!-- 検索 -->
      <section id="view-search" class="view hidden">
        <div class="search-bar">
          <input id="search-input" type="search" placeholder="料理名で検索…" autocomplete="off" />
        </div>
        <div class="tagfilter-wrap">
          <p class="section-label">タグでしぼり込む</p>
          <div id="search-tags" class="chip-row"></div>
        </div>
        <div id="search-list" class="card-grid"></div>
        <div id="search-empty" class="empty hidden"><p>条件に合うレシピが見つかりません。</p></div>
      </section>

      <!-- 詳細 -->
      <section id="view-detail" class="view hidden">
        <div id="detail-body"></div>
      </section>

      <!-- 登録・編集 -->
      <section id="view-form" class="view hidden">
        <form id="recipe-form" class="form">
          <label class="field">
            <span class="field-label">料理名 <em>必須</em></span>
            <input id="f-title" type="text" required placeholder="例：鶏むね肉のしっとり蒸し" />
          </label>

          <label class="field">
            <span class="field-label">写真</span>
            <div class="image-pick">
              <div id="f-image-preview" class="image-preview empty">
                <span>タップして写真を選ぶ</span>
              </div>
              <input id="f-image" type="file" accept="image/*" hidden />
              <button type="button" id="f-image-clear" class="link-btn hidden">写真を削除</button>
            </div>
          </label>

          <label class="field">
            <span class="field-label">材料</span>
            <textarea id="f-ingredients" rows="6" placeholder="鶏むね肉　1枚&#10;塩　少々&#10;酒　大さじ1"></textarea>
          </label>

          <label class="field">
            <span class="field-label">手順</span>
            <textarea id="f-steps" rows="8" placeholder="1. 鶏むね肉を常温にもどす&#10;2. 塩と酒をふる&#10;3. …"></textarea>
          </label>

          <div class="field">
            <span class="field-label">タグ</span>
            <div id="tag-chips" class="chip-row editable"></div>
            <input id="f-tag-input" type="text" placeholder="タグを入力して Enter（例：和食）" autocomplete="off" />
            <div id="tag-suggest" class="tag-suggest"></div>
          </div>

          <div class="form-actions">
            <button type="submit" id="btn-save" class="btn-primary">保存する</button>
            <button type="button" id="btn-cancel" class="btn-ghost">キャンセル</button>
          </div>
        </form>
      </section>

    </main>

    <!-- 追加ボタン（ホーム/検索で表示） -->
    <button id="fab" class="fab" aria-label="新規追加">＋</button>

    <!-- 下部タブ -->
    <nav id="tabbar" class="tabbar">
      <button class="tab active" data-tab="home">
        <span class="tab-ico">🏠</span><span class="tab-txt">ホーム</span>
      </button>
      <button class="tab" data-tab="search">
        <span class="tab-ico">🔍</span><span class="tab-txt">さがす</span>
      </button>
      <button class="tab" data-tab="add">
        <span class="tab-ico">✚</span><span class="tab-txt">追加</span>
      </button>
    </nav>
  </div>

  <!-- 読み込み中オーバーレイ -->
  <div id="loading" class="loading hidden"><div class="spinner"></div></div>
  <!-- トースト通知 -->
  <div id="toast" class="toast hidden"></div>

  <script src="https://accounts.google.com/gsi/client" async></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
